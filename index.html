
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITARY RADIO V29 - ULTRA CONNECT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d0d0d; color: #00ff41; text-align: center; padding: 20px; margin: 0; }
        .radio-container { border: 4px solid #1a1a1a; background: #121212; padding: 25px; border-radius: 35px; max-width: 380px; margin: auto; box-shadow: 0 0 40px #000; position: relative; }
        .system-status { font-size: 0.7rem; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        .screen { background: #000; border: 2px inset #222; padding: 15px; height: 220px; overflow-y: auto; margin-bottom: 20px; text-align: right; font-family: monospace; font-size: 0.9rem; border-left: 5px solid #00ff41; line-height: 1.5; }
        input { width: 88%; padding: 12px; margin-bottom: 12px; background: #0a0a0a; border: 1px solid #00ff41; color: #00ff41; border-radius: 10px; outline: none; font-size: 1rem; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; }
        .btn { padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 10px; border: none; flex: 1; transition: 0.3s; }
        .btn-send { background: #00ff41; color: #000; }
        .btn-connect { background: #0066ff; color: #fff; }
        .btn:active { transform: scale(0.95); opacity: 0.8; }
        .ptt-button { width: 100%; height: 90px; background: linear-gradient(#ff3b3b, #8b0000); color: #fff; border: none; border-radius: 25px; font-size: 1.6rem; font-weight: bold; cursor: pointer; box-shadow: 0 6px #000; margin-bottom: 15px; -webkit-tap-highlight-color: transparent; }
        .ptt-button:active { box-shadow: 0 2px #000; transform: translateY(4px); background: #f00; }
        .msg-line { border-bottom: 1px solid #1a1a1a; padding: 5px 0; }
    </style>
</head>
<body>

<div class="radio-container">
    <div class="system-status" id="headerStat">System Standby</div>
    <div class="screen" id="mainDisplay">يرجى إدخال كود القناة للبدء...</div>
    
    <input type="text" id="textInput" placeholder="اكتب رسالة هنا...">
    <div class="btn-group">
        <button class="btn btn-send" onclick="broadcastText()">إرسال</button>
        <button class="btn btn-connect" onclick="startRadioSync()">ربط القناة</button>
    </div>

    <button id="pttAction" class="ptt-button">PUSH TO TALK</button>
    
    <input type="text" id="channelRef" placeholder="كود القناة (مثلاً: 2026)">
</div>

<script>
    let myPeer = null, voiceStream = null, activeConns = [];
    
    // إعدادات الشبكة المتقدمة لتجاوز الـ Firewall
    const p2pConfig = {
        config: {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' },
                { 'urls': 'stun:stun2.l.google.com:19302' },
                { 'urls': 'stun:global.stun.twilio.com:3478' }
            ]
        }
    };

    // طلب الوصول للمايك فور تحميل الصفحة
    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => { 
        voiceStream = stream; 
        voiceStream.getAudioTracks()[0].enabled = false; 
        updateUI("🎤 المايكروفون جاهز");
    }).catch(err => updateUI("❌ خطأ: يرجى تفعيل المايك"));

    function updateUI(text) {
        const display = document.getElementById('mainDisplay');
        display.innerHTML += `<div class="msg-line">> ${text}</div>`;
        display.scrollTop = display.scrollHeight;
    }

    function startRadioSync() {
        const channel = document.getElementById('channelRef').value.trim().toLowerCase();
        if(!channel) return;
        const targetHostID = "mina-radio-" + channel;

        if(myPeer) myPeer.destroy();
        myPeer = new Peer(p2pConfig);

        myPeer.on('open', (id) => {
            updateUI("📡 جاري فحص القناة " + channel + "...");
            
            // محاولة الاتصال كـ "ضيف"
            const conn = myPeer.connect(targetHostID);
            setupDataHandler(conn);
            myPeer.call(targetHostID, voiceStream);

            // إذا لم يتم العثور على مدير للقناة خلال 3 ثوانٍ، استلم القيادة
            setTimeout(() => {
                if(activeConns.length === 0) {
                    myPeer.destroy();
                    myPeer = new Peer(targetHostID, p2pConfig);
                    myPeer.on('open', () => {
                        updateUI("👑 أنت الآن قائد القناة: " + channel);
                        document.getElementById('headerStat').innerText = "HOSTING: " + channel;
                    });
                    myPeer.on('connection', setupDataHandler);
                    myPeer.on('call', call => { call.answer(voiceStream); setupVoiceHandler(call); });
                }
            }, 3500);
        });

        myPeer.on('connection', setupDataHandler);
        myPeer.on('call', call => { call.answer(voiceStream); setupVoiceHandler(call); });
    }

    function setupDataHandler(c) {
        c.on('open', () => {
            if(!activeConns.find(x => x.peer === c.peer)) activeConns.push(c);
            updateUI("✅ تم الربط بنجاح!");
            document.getElementById('headerStat').innerText = "CONNECTED";
        });
        c.on('data', data => updateUI(data));
        c.on('close', () => { activeConns = activeConns.filter(x => x !== c); });
    }

    function setupVoiceHandler(call) {
        call.on('stream', remoteStream => {
            const audio = new Audio();
            audio.srcObject = remoteStream;
            audio.autoplay = true;
            document.body.appendChild(audio);
            updateUI("🔊 استلام إشارة صوتية");
        });
    }

    function broadcastText() {
        const msg = document.getElementById('textInput').value;
        if(!msg || activeConns.length === 0) return;
        const formatted = `<b>وحدة ${myPeer.id.substring(0,3)}:</b> ${msg}`;
        activeConns.forEach(c => c.open && c.send(formatted));
        updateUI(`<b>أنا:</b> ${msg}`);
        document.getElementById('textInput').value = "";
    }

    // التحكم في زر التحدث (PTT)
    const pttBtn = document.getElementById('pttAction');
    const setMicStatus = (isActive) => {
        if(voiceStream) voiceStream.getAudioTracks()[0].enabled = isActive;
        document.getElementById('mainDisplay').style.borderLeftColor = isActive ? "#ff0000" : "#00ff41";
    };

    pttBtn.onmousedown = () => setMicStatus(true);
    pttBtn.onmouseup = () => setMicStatus(false);
    pttBtn.ontouchstart = (e) => { e.preventDefault(); setMicStatus(true); };
    pttBtn.ontouchend = (e) => { e.preventDefault(); setMicStatus(false); };
</script>
</body>
</html>
