
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>طقس مصر - توقعات دقيقة وتحذيرات سيول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Cairo', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, #0b3b5f 0%, #1b4f72 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .weather-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }
        
        .location-section {
            text-align: center;
            margin-bottom: 25px;
        }
        
        .city-name {
            font-size: 28px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .date {
            color: #ddd;
            margin-top: 8px;
            font-size: 14px;
        }
        
        .temp-main {
            text-align: center;
            margin: 20px 0;
        }
        
        .temp-value {
            font-size: 72px;
            font-weight: bold;
        }
        
        .weather-desc {
            font-size: 20px;
            margin-top: 5px;
            color: #ffeaa7;
        }
        
        .details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .detail-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 10px;
        }
        
        .forecast-section {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            padding-right: 10px;
            border-right: 3px solid #ffaa44;
        }
        
        .forecast-list {
            display: flex;
            overflow-x: auto;
            gap: 12px;
            padding: 10px 0;
        }
        
        .forecast-day {
            min-width: 85px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 12px 8px;
            text-align: center;
        }
        
        .forecast-temp {
            font-size: 16px;
            font-weight: bold;
        }
        
        .rain-alert {
            background: rgba(0, 100, 150, 0.5);
            border-right: 4px solid #00aaff;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
        }
        
        .flood-alert {
            background: rgba(200, 50, 50, 0.4);
            border-right: 4px solid #ff4444;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { background: rgba(200, 50, 50, 0.4); }
            50% { background: rgba(200, 50, 50, 0.7); }
        }
        
        .medical-tips {
            background: rgba(255, 200, 100, 0.15);
            border-right: 3px solid #ffaa44;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 20px;
        }
        
        .tips-content ul {
            padding-right: 20px;
            margin-top: 8px;
        }
        
        .tips-content li {
            margin: 8px 0;
            line-height: 1.5;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 18px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
        }
        
        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        
        .search-box button {
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: #ffaa44;
            color: #1e3c4a;
            font-weight: bold;
            cursor: pointer;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .error {
            background: rgba(255, 100, 100, 0.3);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
        }
        
        .warning-icon {
            font-size: 24px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="search-box">
        <input type="text" id="cityInput" placeholder="🔍 اكتب اسم مدينة مصرية...">
        <button onclick="searchCity()">بحث</button>
        <button onclick="getMyLocation()">📍 موقعي</button>
    </div>
    
    <div id="weatherContent">
        <div class="loading">
            <div style="font-size: 30px;">🌍</div>
            <div>جاري تحديد موقعك...</div>
        </div>
    </div>
</div>

<script>
    const egyptCities = {
        "القاهرة": { lat: 30.0444, lon: 31.2357 },
        "الإسكندرية": { lat: 31.2001, lon: 29.9187 },
        "الجيزة": { lat: 29.987, lon: 31.2118 },
        "الأقصر": { lat: 25.6872, lon: 32.6396 },
        "أسوان": { lat: 24.0889, lon: 32.8998 },
        "شرم الشيخ": { lat: 27.9158, lon: 34.33 },
        "الغردقة": { lat: 27.2574, lon: 33.8116 },
        "بورسعيد": { lat: 31.2653, lon: 32.3019 },
        "السويس": { lat: 29.9737, lon: 32.5263 },
        "طنطا": { lat: 30.7865, lon: 31.0019 },
        "المنصورة": { lat: 31.0404, lon: 31.3807 },
        "الفيوم": { lat: 29.3084, lon: 30.8428 },
        "المنيا": { lat: 28.1099, lon: 30.7503 },
        "أسيوط": { lat: 27.1783, lon: 31.1859 },
        "سوهاج": { lat: 26.5607, lon: 31.6917 },
        "قنا": { lat: 26.1642, lon: 32.7167 },
        "دمياط": { lat: 31.4165, lon: 31.8215 },
        "مرسى مطروح": { lat: 31.3543, lon: 27.2373 }
    };
    
    function translateWeather(code, isDay = true) {
        const map = {
            0: "☀️ صافي", 1: "🌤️ قليل السحب", 2: "⛅ غائم جزئياً", 3: "☁️ غائم",
            45: "🌫️ ضباب", 48: "🌫️ ضباب كثيف",
            51: "🌧️ رذاذ خفيف", 53: "🌧️ رذاذ", 55: "🌧️ رذاذ كثيف",
            61: "🌧️ مطر خفيف", 63: "🌧️ مطر", 65: "🌧️ مطر غزير",
            80: "🌦️ زخات مطر", 81: "🌧️ زخات مطر متوسطة", 82: "⛈️ زخات عنيفة",
            95: "⛈️ عاصفة رعدية", 96: "⛈️ عاصفة رعدية مع برد", 99: "⛈️ عاصفة رعدية شديدة"
        };
        return map[code] || "🌡️ متغير";
    }
    
    function getArabicDay(date) {
        const days = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        return days[date.getDay()];
    }
    
    // نصائح طبية واقعية لمصر
    function getRealMedicalTips(temp, humidity, windSpeed, rainProb, weatherCode) {
        let tips = [];
        
        // تحذير السيول والأمطار الغزيرة
        if (rainProb > 70 || weatherCode === 65 || weatherCode === 82 || weatherCode === 95) {
            tips.push("⚠️⚠️ **تحذير من السيول!** ⚠️⚠️");
            tips.push("🚨 تجنب القيادة تماماً في المناطق المنخفضة والوديان");
            tips.push("🚨 لا تخاطر بعبور مجاري المياه مهما بدت ضحلة");
            tips.push("🚨 ابق في مكان آمن حتى انتهاء الموجة المطرية");
            tips.push("🚨 تابع بيانات الحماية المدنية والدفاع المدني");
        } 
        else if (rainProb > 40) {
            tips.push("🌧️ أمطار متوقعة: القيادة بحذر، استخدم المساحات، حافظ على مسافة أمان");
            tips.push("🧥 احمل معك مظلة أو معطف واقٍ من المطر");
        }
        
        // نصائح حسب الحرارة
        if (temp > 38) {
            tips.push("🔥 موجة حر شديدة جداً: لا تخرج من المنزل إلا للضرورة القصوى");
            tips.push("💧 اشرب ماء بانتظام كل 30 دقيقة، حتى لو لم تشعر بالعطش");
            tips.push("🧢 ارتدِ ملابس قطنية فاتحة وقبعة واسعة");
        } 
        else if (temp > 32) {
            tips.push("☀️ طقس حار: اشرب 3-4 لتر ماء يومياً، تجنب الشمس المباشرة 11ص-3م");
            tips.push("🍉 تناول فواكه غنية بالماء مثل البطيخ والبرتقال");
        } 
        else if (temp < 8) {
            tips.push("❄️ طقس شديد البرودة: ارتدِ 3 طبقات من الملابس، غطِ الرأس والأذنين");
            tips.push("🍵 اشرب مشروبات دافئة (يانسون، زنجبيل، قرفة) لتقوية المناعة");
        }
        else if (temp < 15) {
            tips.push("🧥 طقس بارد: ارتدِ جاكيت مناسب، وتجنب التعرض للتيارات الهوائية");
        }
        else {
            tips.push("🌿 طقس معتدل: فرصة مناسبة للتنزه وممارسة الرياضة");
        }
        
        // نصائح حسب الرطوبة
        if (humidity > 80) {
            tips.push("💧 رطوبة عالية جداً: استخدم المكيف أو المروحة، اشرب ماء بارد");
            tips.push("🫁 مرضى الربو والجيوب الأنفية: تجنب الخروج في الأجواء الرطبة");
        }
        
        // نصائح حسب الرياح
        if (windSpeed > 25) {
            tips.push("💨 رياح قوية جداً: احذر من تطاير الأشياء، تجنب الوقوف تحت اللوحات الإعلانية");
            tips.push("👃 مرتدى الكمامة إذا كنت تعاني من الحساسية أو الربو");
        }
        else if (windSpeed > 15) {
            tips.push("💨 رياح نشطة: احرص على تثبيت الأشياء القابلة للتطاير");
        }
        
        // ضباب
        if (weatherCode === 45 || weatherCode === 48) {
            tips.push("🌫️ ضباب كثيف: القيادة بأضواء خافتة، استخدم زجاج السيارة الأمامي والمساحات");
        }
        
        return tips;
    }
    
    async function fetchWeather(lat, lon, cityName = "") {
        const content = document.getElementById('weatherContent');
        content.innerHTML = `<div class="loading"><div>🌍 جلب بيانات الطقس...</div></div>`;
        
        try {
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=7`;
            
            const resp = await fetch(url);
            const data = await resp.json();
            
            if (!data.current) throw new Error("لا توجد بيانات");
            
            const temp = Math.round(data.current.temperature_2m);
            const humidity = data.current.relative_humidity_2m;
            const wind = Math.round(data.current.wind_speed_10m);
            const weatherCode = data.current.weather_code;
            const weatherDesc = translateWeather(weatherCode);
            const rainProbToday = data.daily.precipitation_probability_max[0] || 0;
            
            // توقعات 7 أيام
            let forecastHtml = '';
            for (let i = 0; i < data.daily.time.length; i++) {
                const date = new Date(data.daily.time[i]);
                const maxT = Math.round(data.daily.temperature_2m_max[i]);
                const minT = Math.round(data.daily.temperature_2m_min[i]);
                const rain = data.daily.precipitation_probability_max[i];
                const icon = translateWeather(data.daily.weather_code[i]);
                
                forecastHtml += `
                    <div class="forecast-day">
                        <div>${getArabicDay(date)}</div>
                        <div style="font-size:24px;">${icon.split(' ')[0]}</div>
                        <div class="forecast-temp">${maxT}° / ${minT}°</div>
                        ${rain > 0 ? `<div style="font-size:11px;color:#88aaff;">🌧️ ${rain}%</div>` : ''}
                    </div>
                `;
            }
            
            // النصائح الطبية الواقعية
            const medicalTips = getRealMedicalTips(temp, humidity, wind, rainProbToday, weatherCode);
            const hasFloodWarning = medicalTips.some(t => t.includes("السيول") || t.includes("تحذير"));
            
            // عرض التنبيهات
            let alertHtml = '';
            if (hasFloodWarning) {
                alertHtml = `
                    <div class="flood-alert">
                        <div style="font-size:20px; font-weight:bold;">⚠️ تحذير عاجل ⚠️</div>
                        <div style="margin-top:8px;">حالة الطقس الحالية تستدعي الحيطة والحذر الشديد!</div>
                    </div>
                `;
            } else if (rainProbToday > 30) {
                alertHtml = `
                    <div class="rain-alert">
                        <div>🌧️ احتمال هطول أمطار: ${rainProbToday}%</div>
                        <div style="font-size:13px; margin-top:5px;">يفضل أخذ المظلة والحذر أثناء القيادة</div>
                    </div>
                `;
            }
            
            const cityDisplay = cityName || `${lat.toFixed(1)}, ${lon.toFixed(1)}`;
            const today = new Date();
            
            content.innerHTML = `
                <div class="weather-card">
                    <div class="location-section">
                        <div class="city-name">📍 ${cityDisplay} <span>🇪🇬 مصر</span></div>
                        <div class="date">${getArabicDay(today)} ${today.getDate()} ${today.toLocaleString('ar', { month: 'long' })}</div>
                    </div>
                    
                    <div class="temp-main">
                        <div class="temp-value">${temp}<span style="font-size:24px;">°C</span></div>
                        <div class="weather-desc">${weatherDesc}</div>
                        <div>🌡️ يشعر بـ ${Math.round(data.current.apparent_temperature)}°</div>
                    </div>
                    
                    <div class="details">
                        <div class="detail-item">
                            <div>💧 الرطوبة</div>
                            <div style="font-size:20px;">${humidity}%</div>
                        </div>
                        <div class="detail-item">
                            <div>💨 الرياح</div>
                            <div style="font-size:20px;">${wind} كم/س</div>
                        </div>
                        <div class="detail-item">
                            <div>🌡️ العظمى</div>
                            <div style="font-size:20px;">${Math.round(data.daily.temperature_2m_max[0])}°</div>
                        </div>
                    </div>
                </div>
                
                ${alertHtml}
                
                <div class="forecast-section">
                    <div class="section-title">📅 توقعات الأسبوع القادم</div>
                    <div class="forecast-list">${forecastHtml}</div>
                </div>
                
                <div class="medical-tips">
                    <div class="section-title" style="border-right-color:#ffaa44;">🏥 نصائح طبية حسب حالة الطقس</div>
                    <div class="tips-content">
                        <ul>
                            ${medicalTips.map(t => `<li>${t}</li>`).join('')}
                        </ul>
                    </div>
                </div>
                
                <div style="font-size:10px; text-align:center; opacity:0.6;">📡 بيانات من Open-Meteo | محدثة يومياً</div>
            `;
            
        } catch (err) {
            content.innerHTML = `<div class="error">❌ خطأ في جلب البيانات<br><small>تأكد من اتصال الإنترنت</small></div>`;
        }
    }
    
    function searchCity() {
        const input = document.getElementById('cityInput').value.trim();
        if (!input) return alert("اكتب اسم مدينة");
        
        let found = false;
        for (let [city, coords] of Object.entries(egyptCities)) {
            if (input.includes(city) || city.includes(input)) {
                fetchWeather(coords.lat, coords.lon, city);
                found = true;
                break;
            }
        }
        
        if (!found) {
            alert(`"${input}" غير موجود في القائمة\nالمدن المتاحة: القاهرة، الإسكندرية، الأقصر، أسوان، شرم الشيخ، الغردقة، وغيرها`);
        }
    }
    
    function getMyLocation() {
        if (!navigator.geolocation) return alert("المتصفح لا يدعم تحديد الموقع");
        
        document.getElementById('weatherContent').innerHTML = `<div class="loading"><div>📍 جاري تحديد موقعك...</div></div>`;
        
        navigator.geolocation.getCurrentPosition(
            (pos) => fetchWeather(pos.coords.latitude, pos.coords.longitude, "موقعي الحالي"),
            () => {
                document.getElementById('weatherContent').innerHTML = `<div class="error">❌ لم نتمكن من تحديد موقعك<br><small>يمكنك البحث يدوياً عن مدينة</small></div>`;
            }
        );
    }
    
    window.onload = getMyLocation;
</script>
</body>
</html>
