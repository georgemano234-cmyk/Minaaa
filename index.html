
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITARY RADIO V26 - GITHUB LIVE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #0f0; text-align: center; padding: 20px; }
        .radio { border: 5px solid #333; background: #222; padding: 20px; border-radius: 30px; max-width: 350px; margin: auto; box-shadow: 0 0 20px #000; }
        .screen { background: #000; border: 2px inset #444; padding: 10px; height: 150px; overflow-y: auto; margin-bottom: 15px; text-align: right; font-size: 0.8rem; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; background: #111; border: 1px solid #0f0; color: #0f0; border-radius: 5px; }
        .btn { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; }
        .ptt { width: 100%; height: 70px; background: #d32f2f; color: #fff; border: none; border-radius: 15px; margin-top: 10px; font-size: 1.2rem; cursor: pointer; }
        .ptt:active { background: #ff0000; }
    </style>
</head>
<body>

<div class="radio">
    <div style="font-size: 0.7rem; margin-bottom: 5px;">MILITARY COMM V26</div>
    <div class="screen" id="log">في انتظار الاتصال...</div>
    
    <input type="text" id="msg" placeholder="اكتب رسالة...">
    <button class="btn" onclick="sendMsg()">ارسل</button>
    
    <button id="ptt" class="ptt">PRESS TO TALK</button>

    <div style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
        <input type="text" id="room" placeholder="اسم الغرفة (مثلا: mina2026)">
        <button class="btn" style="background:#457b9d; color:#fff;" onclick="connect()">اتصال بالقناة</button>
    </div>
</div>

<script>
    let peer, myStream, conns = [];
    const ice = { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } };

    navigator.mediaDevices.getUserMedia({ audio: true }).then(s => { 
        myStream = s; myStream.getAudioTracks()[0].enabled = false; 
    });

    function addLog(m) {
        const log = document.getElementById('log');
        log.innerHTML += `<div>> ${m}</div>`;
        log.scrollTop = log.scrollHeight;
    }

    function connect() {
        const roomName = document.getElementById('room').value.trim().toLowerCase();
        if(!roomName) return;
        const targetID = "room-" + roomName;

        if(peer) peer.destroy();
        peer = new Peer(ice);

        peer.on('open', (myID) => {
            addLog("📡 جاري البحث عن القناة...");
            const c = peer.connect(targetID);
            setupData(c);
            peer.call(targetID, myStream);

            setTimeout(() => {
                if(conns.length === 0) {
                    peer.destroy();
                    peer = new Peer(targetID, ice);
                    peer.on('open', () => addLog("👑 أنت الآن مدير القناة: " + roomName));
                    peer.on('connection', setupData);
                    peer.on('call', call => { call.answer(myStream); setupVoice(call); });
                }
            }, 3000);
        });

        peer.on('connection', setupData);
        peer.on('call', call => { call.answer(myStream); setupVoice(call); });
    }

    function setupData(c) {
        c.on('open', () => {
            if(!conns.find(x => x.peer === c.peer)) conns.push(c);
            addLog("✅ متصل الآن!");
        });
        c.on('data', d => addLog(d));
    }

    function setupVoice(call) {
        call.on('stream', s => {
            const a = new Audio(); a.srcObject = s; a.autoplay = true; document.body.appendChild(a);
            addLog("🔊 الصوت يعمل");
        });
    }

    function sendMsg() {
        const m = document.getElementById('msg');
        if(!m.value || conns.length === 0) return;
        conns.forEach(c => c.open && c.send(`<b>${peer.id.substring(0,4)}:</b> ${m.value}`));
        addLog(`<b>أنا:</b> ${m.value}`);
        m.value = "";
    }

    const ptt = document.getElementById('ptt');
    const toggle = (v) => { if(myStream) myStream.getAudioTracks()[0].enabled = v; };
    ptt.onmousedown = () => toggle(true); ptt.onmouseup = () => toggle(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); toggle(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); toggle(false); };
</script>
</body>
</html>
