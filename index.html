
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITARY RADIO V33 - TUNNEL MODE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: monospace; background: #0a0a0a; color: #0f0; text-align: center; padding: 20px; }
        .case { border: 4px solid #333; background: #111; padding: 20px; border-radius: 30px; max-width: 350px; margin: auto; }
        .screen { background: #000; border: 2px inset #222; padding: 10px; height: 180px; overflow-y: auto; margin-bottom: 15px; text-align: right; font-size: 0.8rem; color: #00ff41; }
        input { width: 80%; padding: 10px; margin-bottom: 10px; background: #000; border: 1px solid #0f0; color: #0f0; border-radius: 5px; }
        .btn { background: #0f0; color: #000; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 45%; }
        .ptt { width: 100%; height: 70px; background: #d00; color: #fff; border: none; border-radius: 15px; margin: 10px 0; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .ptt:active { background: #f00; }
    </style>
</head>
<body>

<div class="case">
    <div style="font-size:0.6rem; color:#444;">SECURE TUNNEL V33</div>
    <div class="screen" id="log">في انتظار القناة...</div>
    
    <input type="text" id="m" placeholder="رسالة...">
    <div style="display:flex; justify-content:space-around;">
        <button class="btn" onclick="send()">إرسال</button>
        <button class="btn" style="background:#0066ff; color:#fff;" onclick="connect()">ربط</button>
    </div>

    <button id="ptt" class="ptt">TALK</button>
    
    <input type="text" id="ch" placeholder="القناة (مثلاً: 2026)">
</div>

<script>
    let p = null, s = null, conns = [];

    // إعدادات نفق Metered المجاني (بيانات تجريبية قوية لكسر الـ NAT)
    const cfg = {
        config: {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                {
                    'urls': 'turn:relay.metered.ca:443',
                    'username': 'metered',
                    'credential': 'metered'
                },
                {
                    'urls': 'turn:relay.metered.ca:80',
                    'username': 'metered',
                    'credential': 'metered'
                }
            ],
            'iceTransportPolicy': 'relay' // إجبار الجهاز على استخدام النفق (أهم سطر للربط العالمي)
        }
    };

    navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => { 
        s = stream; s.getAudioTracks()[0].enabled = false; 
    });

    function add(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    function connect() {
        const cID = document.getElementById('ch').value.trim();
        if(!cID) return;
        const hID = "radio-v33-" + cID;

        if(p) p.destroy();
        p = new Peer(cfg);

        p.on('open', (id) => {
            add("📡 محاولة العبور من النفق...");
            const c = p.connect(hID);
            setupD(c);
            p.call(hID, s);

            setTimeout(() => {
                if(conns.length === 0) {
                    p.destroy();
                    p = new Peer(hID, cfg);
                    p.on('open', () => add("👑 القناة مفتوحة (HOST)"));
                    p.on('connection', setupD);
                    p.on('call', call => { call.answer(s); setupV(call); });
                }
            }, 4500);
        });

        p.on('connection', setupD);
        p.on('call', call => { call.answer(s); setupV(call); });
    }

    function setupD(c) {
        c.on('open', () => {
            if(!conns.find(x => x.peer === c.peer)) conns.push(c);
            add("✅ تم الربط عبر النفق!");
        });
        c.on('data', d => add(d));
    }

    function setupV(call) {
        call.on('stream', rs => {
            const a = new Audio(); a.srcObject = rs; a.autoplay = true; document.body.appendChild(a);
            add("🔊 صوت واصل");
        });
    }

    function send() {
        const msg = document.getElementById('m');
        if(!msg.value || conns.length === 0) return;
        conns.forEach(c => c.open && c.send(`<b>${p.id.substring(0,3)}:</b> ${msg.value}`));
        add(`<b>أنا:</b> ${msg.value}`);
        msg.value = "";
    }

    const ptt = document.getElementById('ptt');
    ptt.onmousedown = () => { if(s) s.getAudioTracks()[0].enabled = true; };
    ptt.onmouseup = () => { if(s) s.getAudioTracks()[0].enabled = false; };
</script>
</body>
</html>
