<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITARY RADIO V28 - GLOBAL BYPASS</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: monospace; background: #1a1a1a; color: #0f0; text-align: center; padding: 20px; margin: 0; }
        .radio-box { border: 5px solid #333; background: #222; padding: 20px; border-radius: 30px; max-width: 360px; margin: auto; box-shadow: 0 0 30px #000; }
        .screen { background: #000; border: 2px inset #444; padding: 10px; height: 200px; overflow-y: auto; margin-bottom: 15px; text-align: right; font-size: 0.85rem; color: #00ff41; line-height: 1.4; }
        input { width: 85%; padding: 12px; margin-bottom: 10px; background: #050505; border: 1px solid #0f0; color: #0f0; border-radius: 8px; outline: none; }
        .btn-action { background: #0f0; color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 8px; width: 45%; }
        .ptt-main { width: 100%; height: 80px; background: linear-gradient(#e63946, #b91c1c); color: #fff; border: none; border-radius: 20px; margin: 15px 0; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px #000; }
        .ptt-main:active { transform: translateY(4px); box-shadow: none; background: #f00; }
        .badge { font-size: 0.6rem; color: #555; margin-top: 10px; }
    </style>
</head>
<body>

<div class="radio-box">
    <div style="margin-bottom: 10px; font-weight: bold;">[ UNIT: <span id="myID">...</span> ]</div>
    <div class="screen" id="display">في انتظار بدء العملية...</div>
    
    <input type="text" id="chatMsg" placeholder="رسالة تكتيكية...">
    <div style="display:flex; justify-content: space-between;">
        <button class="btn-action" onclick="sendData()">إرسال</button>
        <button class="btn-action" style="background:#457b9d; color:#fff;" onclick="startLink()">ربط القناة</button>
    </div>

    <button id="pttTrigger" class="ptt-main">PRESS TO TALK</button>
    
    <input type="text" id="channelID" placeholder="رقم القناة (مثلاً: 7788)">
    <div class="badge">V28 - GLOBAL TURN ENABLED</div>
</div>

<script>
    let peer = null, myStream = null, connections = [];

    // الخوادم دي هي اللي "بتزق" البيانات بين الشبكات المختلفة (الموبايل والواي فاي)
    const radioConfig = {
        config: {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' },
                { 'urls': 'stun:stun2.l.google.com:19302' },
                // خادم TURN مجاني للمساعدة في الربط الصعب
                { 'urls': 'stun:global.stun.twilio.com:3478?transport=udp' }
            ]
        }
    };

    navigator.mediaDevices.getUserMedia({ audio: true }).then(s => { 
        myStream = s; myStream.getAudioTracks()[0].enabled = false; 
    }).catch(e => printLog("❌ المايك مرفوض!"));

    function printLog(m) {
        const d = document.getElementById('display');
        d.innerHTML += `<div>> ${m}</div>`;
        d.scrollTop = d.scrollHeight;
    }

    function startLink() {
        const ch = document.getElementById('channelID').value.trim();
        if(!ch) return;
        const hostKey = "radio-v28-" + ch;

        if(peer) peer.destroy();
        peer = new Peer(radioConfig);

        peer.on('open', (id) => {
            document.getElementById('myID').innerText = id.substring(0,4);
            printLog("📡 جاري محاولة اختراق حواجز الشبكة...");
            
            const conn = peer.connect(hostKey);
            handleData(conn);
            peer.call(hostKey, myStream);

            // لو مفيش رد في 5 ثواني، خليك إنت القائد
            setTimeout(() => {
                if(connections.length === 0) {
                    peer.destroy();
                    peer = new Peer(hostKey, radioConfig);
                    peer.on('open', () => printLog("👑 أنت الآن قائد القناة: " + ch));
                    peer.on('connection', handleData);
                    peer.on('call', call => { call.answer(myStream); handleVoice(call); });
                }
            }, 5000);
        });

        peer.on('connection', handleData);
        peer.on('call', call => { call.answer(myStream); handleVoice(call); });
    }

    function handleData(c) {
        c.on('open', () => {
            if(!connections.find(x => x.peer === c.peer)) connections.push(c);
            printLog("✅ تم الاختراق بنجاح! الاتصال مفعل.");
        });
        c.on('data', d => printLog(d));
        c.on('close', () => { connections = connections.filter(x => x !== c); });
    }

    function handleVoice(call) {
        call.on('stream', s => {
            const a = new Audio(); a.srcObject = s; a.autoplay = true; document.body.appendChild(a);
            printLog("🔊 الصوت واصل الآن");
        });
    }

    function sendData() {
        const m = document.getElementById('chatMsg');
        if(!m.value || connections.length === 0) return;
        connections.forEach(c => c.open && c.send(`<b>${peer.id.substring(0,3)}:</b> ${m.value}`));
        printLog(`<b>أنا:</b> ${m.value}`);
        m.value = "";
    }

    const ptt = document.getElementById('pttTrigger');
    const setMic = (state) => { 
        if(myStream) myStream.getAudioTracks()[0].enabled = state; 
        document.getElementById('display').style.borderColor = state ? "#f00" : "#444";
    };
    ptt.onmousedown = () => setMic(true);
    ptt.onmouseup = () => setMic(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); setMic(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); setMic(false); };
</script>
</body>
</html>
