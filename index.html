
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MILITARY RADIO V32 - TURN SERVER EDITION</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff41; text-align: center; padding: 20px; margin: 0; }
        .radio-box { border: 4px solid #1a1a1a; background: #111; padding: 20px; border-radius: 35px; max-width: 360px; margin: auto; box-shadow: 0 0 40px #000; }
        .screen { background: #000; border: 2px inset #222; padding: 15px; height: 200px; overflow-y: auto; margin-bottom: 20px; text-align: right; font-size: 0.9rem; border-left: 5px solid #00ff41; }
        input { width: 85%; padding: 12px; margin-bottom: 12px; background: #000; border: 1px solid #00ff41; color: #00ff41; border-radius: 10px; outline: none; }
        .btn-action { background: #00ff41; color: #000; border: none; padding: 12px 20px; font-weight: bold; cursor: pointer; border-radius: 10px; width: 48%; transition: 0.3s; }
        .ptt-main { width: 100%; height: 80px; background: linear-gradient(#f00, #800); color: #fff; border: none; border-radius: 20px; margin: 15px 0; font-size: 1.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px #000; }
        .ptt-main:active { transform: translateY(4px); box-shadow: none; background: #ff0000; }
        .status-bar { font-size: 0.6rem; color: #444; margin-top: 10px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="radio-box">
    <div style="margin-bottom: 10px; font-size: 0.8rem;">[ SIGNAL STRENGTH: <span id="sig">LOW</span> ]</div>
    <div class="screen" id="log">في انتظار الأوامر...</div>
    
    <input type="text" id="msgIn" placeholder="رسالة مشفرة...">
    <div style="display:flex; justify-content: space-between;">
        <button class="btn-action" onclick="txData()">إرسال</button>
        <button class="btn-action" style="background:#0066ff; color:#fff;" onclick="startComm()">بدء الربط</button>
    </div>

    <button id="ptt" class="ptt-main">PUSH TO TALK</button>
    
    <input type="text" id="chCode" placeholder="كود القناة (مثلاً: 2026)">
    <div class="status-bar">V32 - OPENRELAY TURN ENABLED</div>
</div>

<script>
    let peer = null, stream = null, conns = [];

    // إعدادات الـ TURN Server لكسر حماية شبكات الموبايل (Data)
    const p2pCfg = {
        config: {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 
                    // استخدام خادم TURN مجاني ليعمل كوسيط بين الشبكات المختلفة
                    'urls': 'turn:openrelay.metered.ca:443',
                    'username': 'openrelayproject',
                    'credential': 'openrelayproject'
                }
            ],
            'iceCandidatePoolSize': 10
        }
    };

    // تفعيل المايكروفون
    navigator.mediaDevices.getUserMedia({ audio: true }).then(s => { 
        stream = s; stream.getAudioTracks()[0].enabled = false; 
        addLog("🎤 المايكروفون مفعل");
    }).catch(e => addLog("❌ خطأ في الوصول للمايك"));

    function addLog(m) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }

    function startComm() {
        const channel = document.getElementById('chCode').value.trim().toLowerCase();
        if(!channel) return;
        const hostID = "radio-v32-" + channel;

        if(peer) peer.destroy();
        peer = new Peer(p2pCfg);

        peer.on('open', (id) => {
            addLog("📡 محاولة اختراق حواجز الشبكة...");
            const c = peer.connect(hostID);
            setupData(c);
            peer.call(hostID, stream);

            // لو مفيش حد رد في 5 ثواني، استلم إنت القناة
            setTimeout(() => {
                if(conns.length === 0) {
                    peer.destroy();
                    peer = new Peer(hostID, p2pCfg);
                    peer.on('open', () => {
                        addLog("👑 أنت الآن مدير القناة: " + channel);
                        document.getElementById('sig').innerText = "HOST";
                    });
                    peer.on('connection', setupData);
                    peer.on('call', call => { call.answer(stream); setupVoice(call); });
                }
            }, 5000);
        });

        peer.on('connection', setupData);
        peer.on('call', call => { call.answer(stream); setupVoice(call); });
    }

    function setupData(c) {
        c.on('open', () => {
            if(!conns.find(x => x.peer === c.peer)) conns.push(c);
            addLog("✅ تم الاتصال العالمي!");
            document.getElementById('sig').innerText = "FULL";
        });
        c.on('data', d => addLog(d));
    }

    function setupVoice(call) {
        call.on('stream', rs => {
            const a = new Audio(); a.srcObject = rs; a.autoplay = true; document.body.appendChild(a);
            addLog("🔊 استقبال إشارة صوتية");
        });
    }

    function txData() {
        const m = document.getElementById('msgIn');
        if(!m.value || conns.length === 0) return;
        conns.forEach(c => c.open && c.send(`<b>${peer.id.substring(0,3)}:</b> ${m.value}`));
        addLog(`<b>أنا:</b> ${m.value}`);
        m.value = "";
    }

    const ptt = document.getElementById('ptt');
    const toggleMic = (on) => { if(stream) stream.getAudioTracks()[0].enabled = on; };
    ptt.onmousedown = () => toggleMic(true);
    ptt.onmouseup = () => toggleMic(false);
    ptt.ontouchstart = (e) => { e.preventDefault(); toggleMic(true); };
    ptt.ontouchend = (e) => { e.preventDefault(); toggleMic(false); };
</script>
</body>
</html>
